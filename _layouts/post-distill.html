---
layout: default
---

<div class="d-title">
  <h1>{{ page.title }}</h1>
  {% if page.subtitle %}<p class="d-subtitle">{{ page.subtitle }}</p>{% endif %}
</div>

<hr class="d-title-rule">

<div class="d-byline">
  <div class="d-byline-inner">
    <div class="d-byline-col">
      <span class="d-byline-label">Author</span>
      <span class="d-byline-value">{{ page.author }}</span>
    </div>
    <div class="d-byline-col">
      <span class="d-byline-label">Published</span>
      <span class="d-byline-value">{{ page.date | date: "%b %-d, %Y" }}</span>
    </div>
  </div>
</div>

<div class="d-article-grid">

  <nav class="d-contents" id="d-toc">
    <h4>Contents</h4>
    <ul id="toc-list"></ul>
  </nav>

  <article class="d-article">
    {{ content }}
  </article>

</div>

<script>
// Footnote popups
(function() {
  var popup = document.createElement('div');
  popup.className = 'fn-popup';
  document.body.appendChild(popup);

  var hideTimer;

  function getFootnoteContent(id) {
    // id is like "fnref:key", footnote li id is "fn:key"
    var fnId = id.replace('fnref:', 'fn:').replace('fnref-', 'fn:');
    var li = document.getElementById(fnId) || document.getElementById(fnId.replace('fn:', 'fn-'));
    if (!li) return null;
    // Clone and strip the backref link
    var clone = li.cloneNode(true);
    var backref = clone.querySelector('.reversefootnote');
    if (backref) backref.remove();
    return clone.innerHTML.trim();
  }

  function show(content, anchorEl) {
    popup.innerHTML = content;
    popup.classList.add('visible');

    var rect = anchorEl.getBoundingClientRect();
    var top = rect.bottom + 8;
    var left = rect.left;

    // Keep within viewport
    if (left + 340 > window.innerWidth - 16) {
      left = window.innerWidth - 340 - 16;
    }
    if (top + 200 > window.innerHeight) {
      top = rect.top - 8 - popup.offsetHeight;
    }

    popup.style.top = top + 'px';
    popup.style.left = left + 'px';
  }

  function hide() {
    popup.classList.remove('visible');
  }

  // Keep popup open when mouse moves into it
  popup.addEventListener('mouseenter', function() { clearTimeout(hideTimer); });
  popup.addEventListener('mouseleave', function() { hideTimer = setTimeout(hide, 200); });

  // Click outside to close
  document.addEventListener('click', function(e) {
    if (!popup.contains(e.target)) hide();
  });

  popup.style.pointerEvents = 'auto';

  document.querySelectorAll('.d-article sup[id^="fnref"] a').forEach(function(a) {
    var supEl = a.parentElement;
    a.addEventListener('mouseenter', function() {
      clearTimeout(hideTimer);
      var content = getFootnoteContent(supEl.id);
      if (content) show(content, a);
    });
    a.addEventListener('mouseleave', function() {
      hideTimer = setTimeout(hide, 200);
    });
    // Prevent jumping to footnote on click
    a.addEventListener('click', function(e) { e.preventDefault(); });
  });
})();
</script>

<script>
// Table of contents
(function() {
  var headings = document.querySelectorAll('.d-article h2, .d-article h3');
  var toc = document.getElementById('toc-list');
  var currentH2Li = null;
  var currentSubList = null;

  headings.forEach(function(h, i) {
    if (!h.id) h.id = 'section-' + i;
    var li = document.createElement('li');
    var a = document.createElement('a');
    a.href = '#' + h.id;
    a.textContent = h.textContent;
    li.appendChild(a);

    if (h.tagName === 'H2') {
      toc.appendChild(li);
      currentH2Li = li;
      currentSubList = null;
    } else if (h.tagName === 'H3') {
      if (!currentSubList) {
        currentSubList = document.createElement('ul');
        if (currentH2Li) currentH2Li.appendChild(currentSubList);
        else toc.appendChild(currentSubList);
      }
      currentSubList.appendChild(li);
    }
  });
})();
</script>
