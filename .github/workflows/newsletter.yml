name: Newsletter on new course post

on:
  push:
    branches: [master]
    paths:
      - "_courses/**/*.md"

jobs:
  send-newsletter:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Send newsletter draft
        run: node .github/scripts/send-newsletter.js
        env:
          BUTTONDOWN_API_KEY: ${{ secrets.BUTTONDOWN_API_KEY }}

      - name: Commit newsletter state
        run: |
          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"
          git add .github/newsletter-state.json
          git diff --staged --quiet || git commit -m "update newsletter state [skip ci]"
          git push
